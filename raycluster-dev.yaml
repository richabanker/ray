apiVersion: v1
kind: Service
metadata:
  name: ray-head
spec:
  ports:
    - {name: gcs, port: 6379, targetPort: 6379}
    - {name: dashboard, port: 8265, targetPort: 8265}
  selector: {app: ray-head}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
spec:
  replicas: 1
  selector: {matchLabels: {app: ray-head}}
  template:
    metadata: {labels: {app: ray-head}}
    spec:
      containers:
        - name: ray-node
          image: us-docker.pkg.dev/richabanker-gke-dev/images/ray:dev16
          args: ["ray start --head --port=6379 --dashboard-host=0.0.0.0 --num-cpus=1 --block"]
          command: ["/bin/bash", "-c"]
          ports: [{containerPort: 6379}, {containerPort: 8265}]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RAY_INFRASTRUCTURE_TAGS
              value: '{"platformType": "kubernetes", "podName": "$(POD_NAME)", "nodeName": "$(NODE_NAME)", "namespace": "$(POD_NAMESPACE)"}'
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir: {medium: Memory}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-worker
spec:
  replicas: 2
  selector: {matchLabels: {app: ray-worker}}
  template:
    metadata: {labels: {app: ray-worker}}
    spec:
      containers:
        - name: ray-node
          image: us-docker.pkg.dev/richabanker-gke-dev/images/ray:dev16
          args: ["ray start --address=ray-head:6379 --block"]
          command: ["/bin/bash", "-c"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RAY_INFRASTRUCTURE_TAGS
              value: '{"platformType": "kubernetes", "podName": "$(POD_NAME)", "nodeName": "$(NODE_NAME)", "namespace": "$(POD_NAMESPACE)"}'
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir: {medium: Memory}